<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta 
      name="viewport" 
      content="width=device-width, 
        initial-scale=1.0">
    <meta 
      http-equiv="X-UA-Compatible" 
      content="ie=edge">
    <title>MediAgenda NodeJS</title>
    <link rel="stylesheet" 
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- font awesome-->
    <link rel="stylesheet"
     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <!-- menu -->
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fa-solid fa-stethoscope me-2"></i>
                MediAgenda NodeJS
            </span>
            <button class="btn btn-light"
              onclick="mostrarSobre()">
                <i class="fa-solid fa-circle-info"></i>
                Sobre
            </button>
        </div>
    </nav>
    <div class="container mt-4">
        <!-- status -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4>
                    <i class="fa-solid fa-heart-pulse text-danger me-2"></i>
                    Status do Sistema
                </h4>
                <p id="statusSistema">Carregando...</p>
            </div>
        </div>
        <!-- consultas -->
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fa-solid fa-calendar-check me-2 text-primary"></i>
                    Consultas Agendadas
                </h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thread class="table-primary">
                            <tr>
                                <th>Paciente</th>
                                <th>Médico</th>
                                <th>Especialidade</th>
                                <th>Data</th>
                                <th>Horário</th>
                                <th>Status</th>
                            </tr>
                        </thread>
                        <tbody id="tabelaConsultas"></tbody>
                    </table>        
                </div>
            </div>
        </div>
    </div>
    <!-- bootstrap js-->
    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="script.js"></script>
</body>
</html>
